name: ConstruMetrix CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Project Dependencies
      run: npm install

    - name: Lint Check (Placeholder)
      run: echo "✅ Lint check passed"

    - name: Integration Tests (Placeholder)
      run: echo "✅ Tests passed"

    - name: Validate Core Files
      run: |
        ls -la index.html app.js geo-visor.js valuation-pro.js
        echo "✅ Core files presence validated."
